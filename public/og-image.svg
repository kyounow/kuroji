<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="kuroji — 会計で学ぶ経営シミュレーション">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#131a1d" />
      <stop offset="1" stop-color="#0b1113" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect x="0" y="0" width="1200" height="10" fill="#0b6e4f" />

  <!-- brand mark -->
  <rect x="80" y="90" width="112" height="112" rx="24" fill="#0b6e4f" />
  <text x="136" y="150" font-family="'Hiragino Sans','Noto Sans JP',system-ui,sans-serif" font-size="72" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="central">黒</text>

  <!-- title -->
  <text x="220" y="130" font-family="system-ui,'Segoe UI',sans-serif" font-size="88" font-weight="800" fill="#ffffff">kuroji</text>
  <text x="222" y="188" font-family="'Hiragino Sans','Noto Sans JP',system-ui,sans-serif" font-size="30" font-weight="600" fill="#3fbf8f">黒字 ― 会計で学ぶ経営シミュレーション</text>

  <!-- tagline -->
  <text x="80" y="300" font-family="'Hiragino Sans','Noto Sans JP',system-ui,sans-serif" font-size="40" font-weight="700" fill="#e7edf2">財務三表（BS・PL・CF）を動かしながら、</text>
  <text x="80" y="356" font-family="'Hiragino Sans','Noto Sans JP',system-ui,sans-serif" font-size="40" font-weight="700" fill="#e7edf2">会社を経営して<tspan fill="#3fbf8f">純資産（黒字）</tspan>を増やす。</text>

  <!-- three-statement bar motif -->
  <g transform="translate(80,430)">
    <rect x="0"   y="70" width="80" height="60"  rx="6" fill="#2f6fb0" />
    <rect x="110" y="40" width="80" height="90"  rx="6" fill="#0b6e4f" />
    <rect x="220" y="10" width="80" height="120" rx="6" fill="#3fbf8f" />
    <text x="0" y="165" font-family="'Hiragino Sans','Noto Sans JP',system-ui,sans-serif" font-size="22" fill="#9aa7b2">BS ・ PL ・ CF のつながりを体験</text>
  </g>

  <!-- url -->
  <text x="1120" y="588" font-family="system-ui,'Segoe UI',sans-serif" font-size="26" font-weight="600" fill="#9aa7b2" text-anchor="end">kyounow.github.io/kuroji</text>
</svg>
